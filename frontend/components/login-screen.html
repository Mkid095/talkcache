<!--
  LOGIN SCREEN COMPONENT
  Feature: User Authentication
  Location: frontend/components/login-screen.html
  Description: Handles username and password input for user login/registration
-->

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-header">
      <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
    </div>

    <!-- Title and subtitle -->
    <h1 class="login-title">Welcome to Talk Cache</h1>
    <p class="login-subtitle">Enter username and password to join (new users will be registered)</p>

    <!-- Login form -->
    <form id="login-form" class="login-form">
      <div class="form-group">
        <label for="username-input" class="form-label">Username</label>
        <input
          id="username-input"
          type="text"
          class="form-input"
          placeholder="e.g. Alex"
          required
          autocomplete="username"
          maxlength="50"
        >
      </div>
      <div class="form-group">
        <label for="password-input" class="form-label">Password</label>
        <input
          id="password-input"
          type="password"
          class="form-input"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
          maxlength="50"
        >
      </div>
      <button type="submit" id="join-btn" class="btn btn-primary" disabled>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
          <polyline points="10 17 15 12 10 7"></polyline>
          <line x1="15" y1="12" x2="3" y2="12"></line>
        </svg>
        Join Chat
      </button>
    </form>
  </div>
</div>
